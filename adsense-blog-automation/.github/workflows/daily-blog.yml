name: 매일 블로그 자동 생성

# 매일 아침 7시(한국시간, KST=UTC+9) = UTC 22:00
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 깃허브에서 수동 실행도 가능

permissions:
  contents: write   # 결과 latest.json 을 저장소에 커밋하기 위함

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: config.json 생성 (시크릿에서)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          WP_ENABLED: ${{ secrets.WP_ENABLED }}
          WP_SITE: ${{ secrets.WP_SITE }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_STATUS: ${{ secrets.WP_STATUS }}
          LANGS: ${{ secrets.LANGS }}
          KO_METRICS_PROVIDER: ${{ secrets.KO_METRICS_PROVIDER }}
          EN_METRICS_PROVIDER: ${{ secrets.EN_METRICS_PROVIDER }}
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          GADS_DEVELOPER_TOKEN: ${{ secrets.GADS_DEVELOPER_TOKEN }}
          GADS_CLIENT_ID: ${{ secrets.GADS_CLIENT_ID }}
          GADS_CLIENT_SECRET: ${{ secrets.GADS_CLIENT_SECRET }}
          GADS_REFRESH_TOKEN: ${{ secrets.GADS_REFRESH_TOKEN }}
          GADS_LOGIN_CUSTOMER_ID: ${{ secrets.GADS_LOGIN_CUSTOMER_ID }}
        run: python build_config.py

      - name: 블로그 생성 실행
        run: python main.py

      - name: 결과 커밋 (대시보드가 읽음)
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard/data/*.json
          git commit -m "자동 생성: $(date -u +%Y-%m-%d)" || echo "변경 없음"
          git push
