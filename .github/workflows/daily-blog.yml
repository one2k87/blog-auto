name: 매일 블로그 자동 생성

# 매일 아침 7시(한국시간, KST=UTC+9) = UTC 22:00
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:      # 폰/깃허브에서 수동 실행
    inputs:
      images:
        description: "이미지 생성 (true/false)"
        default: "true"
        required: false
      categories:
        description: "카테고리 JSON(앱에서 자동 전달). 비우면 시크릿/기본값 사용"
        default: ""
        required: false
      strategy:
        description: "키워드 전략: rankable | traffic | balanced"
        default: ""
        required: false
      ratio:
        description: "검색량 우선 비율 0~100(앱 슬라이더)"
        default: ""
        required: false
      strength:
        description: "안전/품질 강도: 느슨 | 표준 | 엄격 (앱 설정에서 전달)"
        default: ""
        required: false

permissions:
  contents: write   # 결과 latest.json 을 저장소에 커밋하기 위함

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 진단 (버전·패키지 확인)
        run: |
          python --version
          echo "--- 설치된 핵심 패키지 ---"
          pip list 2>/dev/null | grep -i -E "google-generativeai|google-genai|openai|requests|pytrends" || echo "(핵심 패키지 확인 불가)"

      - name: 필수 키 확인
        run: |
          if [ -z "${{ secrets.LLM_API_KEY }}" ]; then
            echo "::error::LLM_API_KEY 시크릿이 비어 있습니다. Settings→Secrets에서 등록하세요."; exit 1
          fi
          echo "LLM_API_KEY 존재 확인 OK (provider=${{ secrets.LLM_PROVIDER }}, model=${{ secrets.LLM_MODEL }})"

      - name: config.json 생성 (시크릿에서)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          CATEGORIES_JSON: ${{ github.event.inputs.categories != '' && github.event.inputs.categories || secrets.CATEGORIES_JSON }}
          KEYWORD_STRATEGY: ${{ github.event.inputs.strategy != '' && github.event.inputs.strategy || secrets.KEYWORD_STRATEGY }}
          TRAFFIC_RATIO: ${{ github.event.inputs.ratio != '' && github.event.inputs.ratio || secrets.TRAFFIC_RATIO }}
          BLOG_URL: ${{ secrets.BLOG_URL }}
          LONG_SERIES: ${{ secrets.LONG_SERIES }}
          LONG_SINGLE: ${{ secrets.LONG_SINGLE }}
          SEASON_SERIES: ${{ secrets.SEASON_SERIES }}
          SEASON_SINGLE: ${{ secrets.SEASON_SINGLE }}
          INSERT_ADS: ${{ secrets.INSERT_ADS }}
          IMAGE_PROVIDER: ${{ secrets.IMAGE_PROVIDER }}
          IMAGE_API_KEY: ${{ secrets.IMAGE_API_KEY }}
          IMAGE_ENABLED: ${{ github.event.inputs.images }}
          METRICS_PROVIDER: ${{ secrets.METRICS_PROVIDER }}
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          WP_ENABLED: ${{ secrets.WP_ENABLED }}
          WP_SITE: ${{ secrets.WP_SITE }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_STATUS: ${{ secrets.WP_STATUS }}
          SAFETY_STRENGTH: ${{ github.event.inputs.strength != '' && github.event.inputs.strength || secrets.SAFETY_STRENGTH }}
          FORCE_DRAFT: ${{ secrets.FORCE_DRAFT }}
          QUALITY_MIN_CHARS: ${{ secrets.QUALITY_MIN_CHARS }}
          QUALITY_MIN_H2: ${{ secrets.QUALITY_MIN_H2 }}
          QUALITY_MAX_DENSITY: ${{ secrets.QUALITY_MAX_DENSITY }}
          QUALITY_MAX_SIMILARITY: ${{ secrets.QUALITY_MAX_SIMILARITY }}
          VERIFY_ACCURACY: ${{ secrets.VERIFY_ACCURACY }}
          RELINK_OLD: ${{ secrets.RELINK_OLD }}
          BLOCKLIST_EXTRA: ${{ secrets.BLOCKLIST_EXTRA }}
        run: python build_config.py

      - name: 블로그 생성 실행
        run: python -u main.py

      - name: 결과 커밋 (대시보드가 읽음)
        if: always()   # 생성 일부 실패해도 만들어진 결과는 커밋
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dashboard/data/*.json 2>/dev/null || true
          git commit -m "자동 생성: $(date -u '+%Y-%m-%d %H:%M')" || echo "변경 없음"
          git push || echo "푸시할 변경 없음"
